<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project • Airz Archive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="site-wrap">
    <header class="hero glass">
      <div class="hero-top">
        <div>
          <span class="eyebrow">Project Viewer</span>
          <h1>Airz Archive Project</h1>
          <p class="hero-text">
            A focused view for each archive entry with previews, download links, and source links.
          </p>
        </div>

        <div class="header-controls">
          <button id="openSettings" class="settings-orb-btn" type="button" aria-label="Open settings">
            <span class="settings-orb-inner">
              <svg class="gear-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M19.14,12.94a7.49,7.49,0,0,0,.05-.94,7.49,7.49,0,0,0-.05-.94l2.11-1.65a.5.5,0,0,0,.12-.64l-2-3.46a.5.5,0,0,0-.6-.22l-2.49,1a7.28,7.28,0,0,0-1.63-.94l-.38-2.65A.5.5,0,0,0,13.78,2H10.22a.5.5,0,0,0-.49.42L9.35,5.07a7.28,7.28,0,0,0-1.63.94l-2.49-1a.5.5,0,0,0-.6.22l-2,3.46a.5.5,0,0,0,.12.64l2.11,1.65a7.49,7.49,0,0,0-.05.94,7.49,7.49,0,0,0,.05.94L2.75,14.59a.5.5,0,0,0-.12.64l2,3.46a.5.5,0,0,0,.6.22l2.49-1a7.28,7.28,0,0,0,1.63.94l.38,2.65a.5.5,0,0,0,.49.42h3.56a.5.5,0,0,0,.49-.42l.38-2.65a7.28,7.28,0,0,0,1.63-.94l2.49,1a.5.5,0,0,0,.6-.22l2-3.46a.5.5,0,0,0-.12-.64ZM12,15.5A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/>
              </svg>
            </span>
          </button>
        </div>
      </div>
    </header>

    <main id="projectDetail" class="section"></main>

    <footer class="footer glass">
      Built by Airz / 41rrz • Hosted with GitHub Pages
    </footer>
  </div>

  <div id="settingsOverlay" class="settings-overlay"></div>

  <aside id="settingsPanel" class="settings-panel glass">
    <div class="settings-head">
      <h2>Site Settings</h2>
      <button id="closeSettings" class="btn secondary" type="button">Close</button>
    </div>

    <div class="settings-group">
      <label class="settings-label" for="themePreset">Theme Preset</label>
      <select id="themePreset" class="settings-input">
        <option value="deep-blue">Deep Blue</option>
        <option value="midnight-cyan">Midnight Cyan</option>
        <option value="terminal-dark">Terminal Dark</option>
        <option value="light-frost">Light Frost</option>
      </select>
    </div>

    <div class="settings-group">
      <label class="settings-label" for="glowStrength">Glow Strength</label>
      <select id="glowStrength" class="settings-input">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>

    <div class="settings-group">
      <label class="settings-label" for="imageFit">Image Fit</label>
      <select id="imageFit" class="settings-input">
        <option value="cover">Cover</option>
        <option value="contain">Contain</option>
      </select>
    </div>

    <div class="settings-group settings-toggle-row">
      <span class="settings-label">Reduced Motion</span>
      <label class="switch">
        <input id="reducedMotion" type="checkbox">
        <span class="switch-slider"></span>
      </label>
    </div>
  </aside>

  <script src="projects.js"></script>
  <script src="script.js"></script>
</body>
</html>
